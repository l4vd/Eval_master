# Hydra composition root for the central benchmark launcher.
#
# One shared `model` block feeds all five benchmarks (their model interfaces were
# unified: a Hub id, a local checkpoint, or a LoRA/PEFT adapter, all auto-detected).
# Each benchmark has its own config group so you can tune its subcomponents, e.g.:
#   ./run_all.sh model.id=/path/to/final_checkpoint
#   ./run_all.sh run='[faitheval,ragtruth]' faitheval.tasks='[unanswerable]'
#   ./run_all.sh model.dtype=float32 model.device_map=cpu num_samples=5 dry_run=true
defaults:
  - model: qwen_tiny
  - faitheval: default
  - truthfulqa: default
  - halueval: default
  - ragtruth: default
  - harness: default
  - _self_

# Which benchmarks to run, in order. Subset the five to run only some.
run: [faitheval, truthfulqa, halueval, ragtruth, harness]

# Global default sample cap for benchmarks that support it (FaithEval, HaluEval,
# RAGTruth, harness). null = full dataset. Each benchmark can override with its own
# `<benchmark>.num_samples`. NOTE: TruthfulQA has no sample cap (it scores the
# whole questions CSV); pre-truncate the CSV if you need a subset there. For
# `harness` the cap is lm_eval's --limit, which applies PER TASK, so a small value
# still fans out across every task in its list.
num_samples: null

# Interpreter used to launch each benchmark. `auto` resolves each benchmark's own
# virtualenv (created by ./setup_envs.sh) — the five have incompatible dependency
# stacks, so they are installed separately. Override globally with `python=...`
# (e.g. `python=python` for one shared env) or per-benchmark with
# `<benchmark>.python=/path/to/python`.
python: auto

# Where the per-benchmark virtualenvs live. null = each benchmark's own
# `<folder>/.venv` (the default; correct on Linux / the cluster).
#
# Set this to relocate them to `<venv_root>/<benchmark-folder>`. Needed on Windows
# when this repo sits deep in the filesystem: `.venv/Lib/site-packages/...` then
# exceeds the 260-character MAX_PATH limit and imports fail with a confusing
# "No such file or directory". It also keeps multi-GB installs out of OneDrive.
# Pass the same value to ./setup_envs.sh (or set the VENV_ROOT env var), e.g.:
#   venv_root: ${oc.env:LOCALAPPDATA}/eval-venvs
venv_root: ${oc.decode:${oc.env:VENV_ROOT,null}}

# Print the commands instead of running them.
dry_run: false

# Keep going if one benchmark exits non-zero (a per-benchmark summary is printed
# at the end either way).
continue_on_error: true

# All artifacts land under here (per-benchmark subdirectories). Defaults to the
# Hydra run directory so --multirun / timestamped runs isolate automatically.
output_dir: ${hydra:runtime.output_dir}

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
