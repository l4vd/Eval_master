# @package _global_
# Copy this to conf/model/<name>.yaml and select it with `model=<name>`.
# Point `id` at your trained checkpoint or LoRA adapter.
model:
  id: "/path/to/final_checkpoint"   # Hub id, local full-model path, or LoRA adapter dir
  base_model_id: null               # e.g. "meta-llama/Meta-Llama-3.1-8B-Instruct" for a LoRA
  tokenizer_id: null
  cache_dir: null
  dtype: "${auto_dtype:}"           # bf16 (Ampere+) | fp16 (older GPU) | fp32 (CPU); or pin explicitly
  device_map: "auto"
  device_index: "${auto_device_index:}"  # cuda:0 if a GPU is visible, else CPU; or pin explicitly
