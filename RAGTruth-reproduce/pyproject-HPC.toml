[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ragtruth-eval"
version = "0.1.0"
description = "Serverless two-stage RAGTruth evaluation — HPC / Linux variant pinned to the cluster's known-good stack (torch 2.2.2, transformers 4.41, Python 3.12)."
readme = "README.md"
# The HPC provides Python 3.12 modules and the known-good cluster env (`topollm`)
# pins 3.12; torch 2.2.2 wheels exist for 3.12. Stay inside that window.
requires-python = ">=3.12,<3.13"
license = { file = "LICENSE" }

# --- Versioning policy for this file -------------------------------------------
# Libraries SHARED with the cluster's already-working `topollm` / `SP-DPO-Base`
# environment are pinned to the SAME ranges that are known to resolve on the HPC
# PyPI mirror (marked "[cluster]").
#
# No vLLM here (torch-2.2 incompatible). The whole point of this rewrite is that
# RAGTruth no longer needs a TGI/Docker server: both the generation model and the
# detector run in-process via HF (src/ragtruth_eval/model.py). The detector
# weights (CodingLL/RAGTruth_Eval) are user-supplied via --detector-model-id and
# must be pre-downloaded into the HF cache (compute nodes have no internet).
# -------------------------------------------------------------------------------
dependencies = [
    "torch==2.2.2",                  # [cluster] exact cluster pin
    "transformers>=4.41,<4.42",      # [cluster]
    "peft>=0.10,<0.12",              # [cluster]
    "accelerate>=0.27,<0.29",        # [cluster]
    "datasets>=2.18,<3.0",           # [cluster] datasets <3.0
    "pyarrow<16",                    # [cluster] keeps datasets <3.0 happy
    "huggingface-hub>=0.23,<0.24",   # [cluster] >=0.23 required by transformers 4.41
    "numpy>=1.26,<2",                # [cluster] torch 2.2.x requires numpy 1.x
    "pandas<2.3",                    # [cluster] (used by the retained baseline/ trainer path)
    "scikit-learn<1.8",              # [cluster] (used by the retained baseline/ trainer path)
    "sentencepiece>=0.2.0,<0.2.1",   # [cluster] detector tokenizer (Llama-2 family)
    "tqdm>=4.66",                    # [cluster]
    "scipy>=1.11,<1.14",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
ragtruth-eval = "ragtruth_eval.cli:main"

[tool.uv]
index-strategy = "unsafe-best-match"

# The HPC compute nodes have no internet; uv must install from the cluster PyPI
# mirror. Uncomment and set the mirror (as the working `topollm` project does)
# before running `uv sync` on the cluster:
#
# [[tool.uv.index]]
# name = "cluster-mirror"
# url = "<CLUSTER_PYPI_MIRROR_URL>"
# default = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
