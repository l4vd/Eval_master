[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eval-master"
version = "0.1.0"
description = "Central Hydra launcher — HPC / Linux variant pinned to the cluster's known-good stack (Python 3.12)."
readme = "README-runner.md"
# The HPC provides Python 3.12 modules and the known-good cluster env (`topollm`)
# pins 3.12. Stay inside that window.
requires-python = ">=3.12,<3.13"

# --- Versioning policy for this file -------------------------------------------
# hydra-core / omegaconf / numpy are pinned to the same ranges already known to
# resolve on the HPC PyPI mirror via the `topollm` / `SP-DPO-Base` environment
# (marked "[cluster]"). numpy backs the read-only `analysis` aggregation package;
# scipy/matplotlib are lazy extras. Each benchmark brings its own stack in its
# own virtualenv (see setup_envs.sh --hpc).
# -------------------------------------------------------------------------------
dependencies = [
    "hydra-core>=1.3.0",   # [cluster]
    "omegaconf>=2.3.0",    # [cluster]
    "numpy>=1.24",         # [cluster]
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]
stats = ["scipy>=1.10"]        # Wilcoxon signed-rank in analysis.stats (lazy import)
plot = ["matplotlib>=3.7"]     # figures in analysis.plot (lazy import)

[tool.uv]
index-strategy = "unsafe-best-match"

[tool.uv.sources]
hydra-hpc-launcher = { git = "https://github.com/carelvniekerk/Hydra-HPC-Launcher.git", rev = "main" }

# The HPC compute nodes have no internet; uv must install from the cluster PyPI
# mirror. Uncomment and set the mirror (as the working `topollm` project does)
# before running `uv sync` on the cluster:
#
# [[tool.uv.index]]
# name = "cluster-mirror"
# url = "<CLUSTER_PYPI_MIRROR_URL>"
# default = true

# run_benchmarks.py is a script run in place; the importable code is the additive
# read-only `analysis` package (aggregation / comparison / plotting over results).
[tool.setuptools.packages.find]
include = ["analysis*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["analysis/tests"]
